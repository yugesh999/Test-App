name: demo_project
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  file_picker:
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.2
  data_connection_checker_tv: ^0.3.5-nullsafety
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_mobx: ^2.0.6+1
  flutter_gen_runner: ^5.2.0
  google_maps_flutter: ^2.8.1
  flutter_polyline_points:
  http: ^1.1.0
  flutter_svg:
  intl:
  dio:
  pretty_dio_logger:
  json_annotation: ^4.6.0
  mobx: ^2.0.7+5
  provider: ^6.0.3
  salomon_bottom_bar: ^3.3.2
  shared_preferences: ^2.0.15
  dropdown_button2:
  pinput:
#  input:
  permission_handler:
  smooth_page_indicator:
  cached_network_image: ^3.2.1
  carousel_slider:
  shimmer:
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0
  device_info_plus: ^12.3.0
  image_picker: ^1.1.2
  super_tooltip:
  syncfusion_flutter_charts:
  syncfusion_flutter_gauges:

  url_launcher: ^6.2.5
  open_file: ^3.3.2

flutter_gen:
  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/colors/colors.xml
dev_dependencies:
  build_runner: ^2.2.0
  flutter_lints:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.3.1
  mobx_codegen:

flutter:

  uses-material-design: true
  assets:
    - assets/svg/
    - lib/shared/lang/en.json

  fonts:
    - family: BiloExtraBold
      fonts:
        - asset: assets/fonts/bilo/Bilo-ExtraBold.otf
    - family: BiloMedium
      fonts:
        - asset: assets/fonts/bilo/Bilo-Medium.otf
    - family: BiloBold
      fonts:
        - asset: assets/fonts/bilo/Bilo-Bold.otf
    - family: BiloRegular
      fonts:
        - asset: assets/fonts/bilo/Bilo-Regular.otf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/bilo/NunitoSans.ttf
    - family: BiloLight
      fonts:
        - asset: assets/fonts/bilo/Bilo-Light.otf
